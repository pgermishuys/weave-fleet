name: Deploy

on:
  # Trigger automatically after CI succeeds on main
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

  # Allow manual dispatch to bypass CI gate (emergency deploys)
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for manual deploy (skips CI gate)
        required: true
        default: Manual deploy

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    # For workflow_run: only run if CI succeeded
    # For workflow_dispatch: always run (operator accepts responsibility)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Resolve commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup SSH
        id: ssh
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.FLEET_SSH_KEY }}
          ssh-host: ${{ secrets.FLEET_HOST }}
          ssh-host-public-key: ${{ secrets.FLEET_SSH_HOST_PUBLIC_KEY }}

      - name: Deploy
        env:
          FLEET_HOST: ${{ secrets.FLEET_HOST }}
          FLEET_DOMAIN: ${{ secrets.FLEET_DOMAIN }}
          Fleet__Auth__Authority: ${{ secrets.FLEET_AUTH_AUTHORITY }}
          Fleet__Auth__ClientId: ${{ secrets.FLEET_AUTH_CLIENT_ID }}
          Fleet__Auth__ClientSecret: ${{ secrets.FLEET_AUTH_CLIENT_SECRET }}
          SSH_OPTS: ${{ steps.ssh.outputs.ssh-opts }}
        run: bash deploy/deploy.sh

      - name: Cleanup SSH key
        if: always()
        env:
          FLEET_HOST: ${{ secrets.FLEET_HOST }}
        run: |
          rm -f ~/.ssh/fleet-deploy-key
          ssh-keygen -R "$FLEET_HOST" 2>/dev/null || true
