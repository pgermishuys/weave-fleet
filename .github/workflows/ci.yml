name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.weave/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.weave/**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── .NET unit / integration tests ────────────────────────────────────────
  test:
    name: .NET Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build WeaveFleet.slnx --configuration Release -p:SkipFrontendBuild=true

      - name: Run .NET tests
        run: >
          dotnet test WeaveFleet.slnx
          --configuration Release
          --filter "Category!=E2E&Category!=Benchmark&Category!=HarnessSmoke"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory test-results/
          --no-build
          -p:SkipFrontendBuild=true

      - name: Run NuCode tests (MTP)
        run: |
          dotnet build tests/NuCode.Tests --configuration Release
          dotnet exec tests/NuCode.Tests/bin/Release/net10.0/NuCode.Tests.dll

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Report .NET test results
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: .NET Test Results
          path: test-results/**/*.trx
          reporter: dotnet-trx

  # ── Frontend checks (lint, typecheck, unit tests) ────────────────────────
  client:
    name: Client
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Enable Corepack npm
        run: corepack enable

      - name: Install dependencies
        run: corepack npm ci
        working-directory: client

      - name: Lint
        run: npm run lint
        working-directory: client

      - name: Typecheck
        run: npm run typecheck
        working-directory: client

      - name: Unit tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results/client-results.xml
        working-directory: client

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-results-${{ github.run_id }}
          path: client/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Report client test results
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: Client Test Results
          path: client/test-results/**/*.xml
          reporter: java-junit

  # ── Playwright E2E – shared build ───────────────────────────────────────
  e2e-setup:
    name: E2E Setup
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: client

      - name: Build frontend SPA
        run: bun run build
        working-directory: client

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build WeaveFleet.slnx --configuration Release

      - name: Archive build artifacts
        run: >
          tar -cf e2e-build.tar
          tests/WeaveFleet.E2E/bin/Release/
          tests/WeaveFleet.E2E/obj/
          src/*/bin/Release/
          src/*/obj/
          client/dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-build-${{ github.run_id }}
          path: e2e-build.tar
          retention-days: 1

  # ── Playwright E2E – per-lane test jobs ────────────────────────────────
  e2e:
    name: E2E (${{ matrix.lane }})
    needs: e2e-setup
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        lane: [Smoke, Workflow, Regression, WebSocket]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-build-${{ github.run_id }}

      - name: Extract build artifacts
        run: tar -xf e2e-build.tar

      - name: Get installed Playwright version
        shell: pwsh
        run: |
          $version = (Select-Xml -Path "Directory.Packages.props" -XPath "//PackageVersion[@Include='Microsoft.Playwright']/@Version").Node.Value
          "PLAYWRIGHT_VERSION=$version" >> $env:GITHUB_ENV

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ env.PLAYWRIGHT_VERSION }}
          restore-keys: playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh tests/WeaveFleet.E2E/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Install Playwright OS dependencies
        run: pwsh tests/WeaveFleet.E2E/bin/Release/net10.0/playwright.ps1 install-deps chromium

      - name: Trust dev certs
        run: |
          dotnet dev-certs https --clean
          dotnet dev-certs https --trust || [ $? -eq 4 ]
          DEV_CERTS_TRUST="$HOME/.aspnet/dev-certs/trust"
          EXISTING="${SSL_CERT_DIR:-/usr/lib/ssl/certs}"
          echo "SSL_CERT_DIR=${DEV_CERTS_TRUST}:${EXISTING}" >> $GITHUB_ENV

      - name: Run E2E tests (${{ matrix.lane }})
        run: >
          dotnet test tests/WeaveFleet.E2E/
          --configuration Release
          --filter "Category=E2E&Category!=Benchmark&Lane=${{ matrix.lane }}"
          --logger "trx;LogFileName=e2e-${{ matrix.lane }}-results.trx"
          --results-directory test-results/
          --no-build
          -p:SkipFrontendBuild=true
        env:
          ASPNETCORE_ENVIRONMENT: Test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ matrix.lane }}-${{ github.run_id }}
          path: |
            test-results/
            tests/WeaveFleet.E2E/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Report E2E test results
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Results (${{ matrix.lane }})
          path: test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

  # ── AOT publish validation ────────────────────────────────────────────────
  aot:
    name: AOT Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-aot-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-aot-${{ runner.os }}-

      - name: AOT publish (linux-x64)
        run: |
          dotnet publish src/WeaveFleet.Api/WeaveFleet.Api.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --output artifacts/publish/linux-x64 \
            -p:SkipFrontendBuild=true

      - name: Smoke test AOT binary
        shell: bash
        run: |
          binary="artifacts/publish/linux-x64/WeaveFleet.Api"
          chmod +x "$binary"
          port="5010"
          log_path="/tmp/fleet-smoke.log"

          Fleet__Host="127.0.0.1" Fleet__Port="$port" "$binary" >"$log_path" 2>&1 &
          app_pid=$!

          cleanup() { kill "$app_pid" 2>/dev/null || true; }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${port}/healthz" >/dev/null; then
              echo "AOT smoke test passed — healthz responded OK."
              kill "$app_pid" 2>/dev/null || true
              wait "$app_pid" 2>/dev/null || true
              trap - EXIT
              exit 0
            fi

            if ! kill -0 "$app_pid" 2>/dev/null; then
              echo "::error::AOT binary crashed during startup"
              cat "$log_path"
              exit 1
            fi

            sleep 1
          done

          echo "::error::AOT binary did not become healthy within 30s"
          cat "$log_path"
          exit 1

  # ── UI responsiveness benchmarks ──────────────────────────────────────────
  benchmarks:
    name: UI Responsiveness Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: client

      - name: Build frontend SPA
        run: bun run build
        working-directory: client

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build WeaveFleet.slnx --configuration Release

      - name: Get installed Playwright version
        shell: pwsh
        run: |
          $version = (Select-Xml -Path "Directory.Packages.props" -XPath "//PackageVersion[@Include='Microsoft.Playwright']/@Version").Node.Value
          "PLAYWRIGHT_VERSION=$version" >> $env:GITHUB_ENV

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache-benchmarks
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ env.PLAYWRIGHT_VERSION }}
          restore-keys: playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache-benchmarks.outputs.cache-hit != 'true'
        run: pwsh tests/WeaveFleet.E2E/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Install Playwright OS dependencies
        run: pwsh tests/WeaveFleet.E2E/bin/Release/net10.0/playwright.ps1 install-deps chromium

      - name: Run benchmark tests
        run: >
          dotnet test tests/WeaveFleet.E2E/
          --configuration Release
          --filter "Category=Benchmark"
          --logger "trx;LogFileName=benchmark-results.trx"
          --results-directory test-results/
          --no-build
        env:
          ASPNETCORE_ENVIRONMENT: Test

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            test-results/
            tests/WeaveFleet.E2E/bin/Release/net10.0/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Report benchmark test results
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: Benchmark Results
          path: test-results/**/*.trx
          reporter: dotnet-trx

      - name: Summarize benchmark metrics
        if: always()
        shell: pwsh
        run: |
          $metricsFiles = Get-ChildItem "tests/WeaveFleet.E2E/bin/Release/net10.0/test-results/*-metrics.json" -ErrorAction SilentlyContinue | Sort-Object Name
          if (-not $metricsFiles) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Benchmark Metrics`n`nNo benchmark metrics files were produced.`n"
            exit 0
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Benchmark Metrics`n"

          foreach ($file in $metricsFiles) {
            $payload = Get-Content $file.FullName -Raw | ConvertFrom-Json
            $meta = $payload.Metadata

            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### $($meta.Scenario)`n"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Test: ``$($meta.TestClass).$($meta.TestMethod)``"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Run ID: ``$($meta.BenchmarkRunId)``"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Captured: ``$($meta.CapturedAtUtc)``"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Metric | Count | P50 | P95 | Max | Mean |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "|---|---:|---:|---:|---:|---:|"

            foreach ($metric in $payload.Metrics.PSObject.Properties | Sort-Object Name) {
              $value = $metric.Value
              $line = "| $($metric.Name) | $($value.Count) | $([string]::Format([System.Globalization.CultureInfo]::InvariantCulture, '{0:F1}', $value.P50)) | $([string]::Format([System.Globalization.CultureInfo]::InvariantCulture, '{0:F1}', $value.P95)) | $([string]::Format([System.Globalization.CultureInfo]::InvariantCulture, '{0:F1}', $value.Max)) | $([string]::Format([System.Globalization.CultureInfo]::InvariantCulture, '{0:F1}', $value.Mean)) |"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $line
            }

            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          }
