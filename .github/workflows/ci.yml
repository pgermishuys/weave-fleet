name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── .NET unit / integration tests ────────────────────────────────────────
  test:
    name: .NET Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build WeaveFleet.slnx --configuration Release -p:SkipFrontendBuild=true

      - name: Run .NET tests
        run: >
          dotnet test WeaveFleet.slnx
          --configuration Release
          --filter "Category!=E2E"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory test-results/
          --no-build
          -p:SkipFrontendBuild=true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Report .NET test results
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: .NET Test Results
          path: test-results/**/*.trx
          reporter: dotnet-trx

  # ── Frontend checks (lint, typecheck, unit tests) ────────────────────────
  client:
    name: Client
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Lint
        run: npm run lint
        working-directory: client

      - name: Typecheck
        run: npm run typecheck
        working-directory: client

      - name: Unit tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results/client-results.xml
        working-directory: client

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-results-${{ github.run_id }}
          path: client/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Report client test results
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: Client Test Results
          path: client/test-results/**/*.xml
          reporter: java-junit

  # ── Playwright E2E tests ─────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET SDK ──────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Node.js (for frontend toolchain) ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
 
      # ── Bun (used by E2E frontend build target) ───────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Install frontend dependencies ─────────────────────────────────────
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: client

      # ── Build SPA ─────────────────────────────────────────────────────────
      - name: Build frontend SPA
        run: bun run build
        working-directory: client

      # ── NuGet cache ───────────────────────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      # ── Build solution ────────────────────────────────────────────────────
      - name: Build solution
        run: dotnet build WeaveFleet.slnx --configuration Release

      # ── Resolve Playwright version ────────────────────────────────────────
      - name: Get installed Playwright version
        shell: pwsh
        run: |
          $version = (Select-Xml -Path "Directory.Packages.props" -XPath "//PackageVersion[@Include='Microsoft.Playwright']/@Version").Node.Value
          "PLAYWRIGHT_VERSION=$version" >> $env:GITHUB_ENV

      # ── Playwright browser cache ──────────────────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ env.PLAYWRIGHT_VERSION }}
          restore-keys: playwright-${{ runner.os }}-${{ runner.arch }}-

      # ── Install Playwright browsers ───────────────────────────────────────
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh tests/WeaveFleet.E2E/bin/Release/net10.0/playwright.ps1 install chromium

      # Install OS dependencies on every run (GitHub-hosted runners are ephemeral)
      - name: Install Playwright OS dependencies
        run: pwsh tests/WeaveFleet.E2E/bin/Release/net10.0/playwright.ps1 install-deps chromium

      # ── Run E2E tests ─────────────────────────────────────────────────────
      - name: Run E2E tests
        run: >
          dotnet test tests/WeaveFleet.E2E/
          --configuration Release
          --filter "Category=E2E"
          --logger "trx;LogFileName=e2e-results.trx"
          --results-directory test-results/
          --no-build
        env:
          ASPNETCORE_ENVIRONMENT: Test

      # ── Upload test artifacts on failure ──────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ github.run_id }}
          path: |
            test-results/
            tests/WeaveFleet.E2E/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Report E2E test results
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright E2E Results
          path: test-results/**/*.trx
          reporter: dotnet-trx
